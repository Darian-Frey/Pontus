# Example pontus-daemon configuration (F-018).
#
# Run with:  pontus-daemon --config examples/pontus-daemon.toml
# Verify a config without waiting for intervals:  pontus-daemon --config … --once
#
# The daemon shells out to `pontus-cli scan` for each job (D-008), so the CLI it
# invokes must hold CAP_NET_RAW (see `make cap`). Results are written to `db` as
# ordinary append-only observations — drift, baselines and the risk view all see
# them with no extra wiring.

# Store every scan writes to.
db = "pontus.db"
# Path to the capability-granted CLI. A bare name is resolved on PATH.
cli = "./target/release/pontus-cli"
# Produce a baseline immediately on startup, then follow each job's interval.
run_at_start = true

# A frequent, shallow sweep of the LAN with vulnerability assessment.
[[job]]
name = "lan-hourly"
targets = "192.168.1.0/24"
interval = "1h"
scope = ["192.168.1.0/24"]
ports = "22,80,443,445,3389,8080"
top_ports = 100
assess_vulns = true
operator = "daemon"

# A daily, deeper pass including UDP and TLS/HTTP inspection.
[[job]]
name = "lan-daily-deep"
targets = "192.168.1.0/24"
interval = "1d"
udp_ports = "53,123,161,5353"
inspect = true
assess_vulns = true
operator = "daemon"

# --- Alerting (F-019) ---
#
# After each scheduled scan, the daemon diffs it against the previous scan of the
# same target range and fires any matching rules. Because a diff reports a change
# once, an alert fires once per change (not every scan while the condition holds).
# The first scan of a range has no baseline, so it never alerts.
#
# Channel URLs live under [channels.*]; `log` and `desktop` (notify-send) need no
# config. A rule referencing webhook/slack/discord without a configured URL is
# rejected at startup. (Email delivery is not yet implemented.)

[channels.slack]
url = "https://hooks.slack.com/services/XXXX/YYYY/ZZZZ"

# [channels.discord]
# url = "https://discord.com/api/webhooks/…"
# [channels.webhook]
# url = "https://example.internal/pontus-hook"   # receives the full alert JSON

# Notify when SSH appears anywhere it wasn't before.
[[alert]]
name = "ssh-opened"
on = "port_opened"
port = 22
proto = "tcp"
channels = ["log", "slack"]

# Notify when a previously-unseen host joins the network.
[[alert]]
name = "new-host"
on = "host_new"
channels = ["log", "slack"]

# Conditions: port_opened, port_closed, host_new, host_vanished, host_changed,
# address_moved. `port`/`proto` filter the two port_* conditions (omit = any).
